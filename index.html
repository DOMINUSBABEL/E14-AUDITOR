  <body>
    <!-- Radial top glow element -->
    <div class="gradient-glow"></div>
    
    <!-- Particle Canvas background -->
    <canvas id="particles-canvas" style="position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.5;"></canvas>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <script>
      (function() {
        const canvas = document.getElementById('particles-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        });

        const particles = [];
        const count = 60;

        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: Math.random() * 1.8 + 0.4,
            vx: (Math.random() - 0.5) * 0.35,
            vy: (Math.random() - 0.5) * 0.35,
            color: Math.random() > 0.5 ? 'rgba(217, 70, 239, 0.25)' : 'rgba(6, 182, 212, 0.25)'
          });
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);
          particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > width) p.vx *= -1;
            if (p.y < 0 || p.y > height) p.vy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
          });
          requestAnimationFrame(animate);
        }
        animate();
      })();
    </script>
  </body>
